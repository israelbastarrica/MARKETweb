<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Deposito 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
    #canvas { width: 100vw; height: 100vh; touch-action: none; outline: none; }

    #loading {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 18px;
    }

    #panel {
      position: fixed; top: 20px; right: 20px;
      width: 300px; background: rgba(10, 10, 30, 0.92);
      color: white; border-radius: 10px; padding: 16px;
      display: none; max-height: 80vh; overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    #panel-titulo { font-size: 16px; color: #4fc3f7; font-weight: bold; }
    #panel-cerrar {
      cursor: pointer; font-size: 18px; line-height: 1;
      background: none; border: none; color: white;
    }
    .producto {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 8px 0; font-size: 13px;
    }
    .producto:last-child { border-bottom: none; }
    .artcod { color: #888; font-size: 11px; margin-top: 2px; }
    .palet-badge {
      display: inline-block; background: rgba(255,200,0,0.15);
      color: #ffd700; border: 1px solid rgba(255,200,0,0.35);
      border-radius: 3px; padding: 1px 5px; font-size: 11px; margin-left: 4px;
    }

    #busqueda {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      background: rgba(10,10,30,0.88); padding: 7px 14px;
      border-radius: 24px; border: 1px solid rgba(255,255,255,0.15); z-index: 10;
    }
    #search-input {
      background: transparent; border: none; outline: none;
      color: white; font-size: 14px; width: 230px;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.35); }
    .sbtn {
      background: none; border: none; cursor: pointer;
      color: #4fc3f7; font-size: 13px; padding: 2px 6px;
    }
    #search-count { color: rgba(255,255,255,0.55); font-size: 12px; min-width: 70px; }

    /* Toggle Modo libre */
    #modo-libre {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      display: flex; align-items: center; gap: 7px;
      background: rgba(10,10,30,0.88); padding: 8px 14px;
      border-radius: 24px; border: 1px solid rgba(255,255,255,0.15);
      color: #cdd2dc; font-size: 13px; cursor: pointer; user-select: none;
    }
    #modo-libre input { cursor: pointer; }

    #instrucciones {
      position: fixed; bottom: 16px; left: 16px;
      color: rgba(255,255,255,0.5); font-size: 12px; line-height: 1.6;
    }

    #highlight-label {
      position: fixed; pointer-events: none;
      background: rgba(0,0,0,0.7); color: #4fc3f7;
      padding: 4px 10px; border-radius: 4px; font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<label id="modo-libre">
  <input type="checkbox" id="chk-libre" onchange="setModoLibre(this.checked)" />
  Modo libre (WASD)
</label>

<div id="busqueda">
  <input id="search-input" type="text" placeholder="Buscar artículo (código o descripción)..."
    onkeydown="if(event.key==='Enter') buscarArticulo()" />
  <button class="sbtn" onclick="buscarArticulo()">Buscar</button>
  <button class="sbtn" id="btn-limpiar" onclick="limpiarBusqueda()" style="display:none">✕ Limpiar</button>
  <span id="search-count"></span>
</div>
<div id="loading">Cargando modelo...</div>

<div id="panel">
  <div id="panel-header">
    <span id="panel-titulo">Modulo</span>
    <button id="panel-cerrar" onclick="cerrarPanel()">x</button>
  </div>
  <div id="panel-productos"></div>
</div>

<div id="highlight-label"></div>

<div id="instrucciones"></div>

<script src="/lib/babylon/babylon.js"></script>
<script src="/lib/babylon/babylonjs.loaders.min.js"></script>
<script>
  const canvas = document.getElementById('canvas');
  const engine = new BABYLON.Engine(canvas, true);
  const MODULE_REGEX = /^([A-Z]\d{2}|101-\d{2})-\d+$/;

  let modoLibre = false;
  let camTop, camLibre;
  let _minY = 0, _maxY = 20;

  const INSTR_TOP = "Vista desde arriba · rueda: zoom · arrastrar: girar/desplazar<br>Tildá <b>Modo libre</b> para caminar por el depósito";
  const INSTR_LIBRE = "W/A/S/D: moverse · Mouse: mirar<br>Espacio: subir · Shift/Ctrl: bajar · Click en módulo: ver artículos";

  function actualizarInstrucciones() {
    document.getElementById('instrucciones').innerHTML = modoLibre ? INSTR_LIBRE : INSTR_TOP;
  }

  const createScene = () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.08, 0.08, 0.15, 1);
    scene.setRenderingAutoClearDepthStencil(2, false);

    // --- Cámara CENITAL (por defecto): mira desde arriba, con leve inclinación para dar volumen ---
    camTop = new BABYLON.ArcRotateCamera('camTop', -Math.PI / 2, 0.16, 60, BABYLON.Vector3.Zero(), scene);
    camTop.minZ = 0.1;
    camTop.lowerBetaLimit = 0.02;     // casi perpendicular (desde arriba)
    camTop.upperBetaLimit = 1.15;     // permite inclinar un poco si quiere
    camTop.lowerRadiusLimit = 5;
    camTop.wheelDeltaPercentage = 0.02;
    camTop.panningSensibility = 30;   // desplazamiento con botón derecho
    camTop.allowUpsideDown = false;

    // --- Cámara LIBRE: primera persona, WASD + espacio/shift/ctrl ---
    camLibre = new BABYLON.UniversalCamera('camLibre', new BABYLON.Vector3(0, 2, -10), scene);
    camLibre.minZ = 0.1;
    camLibre.speed = 0.35;
    camLibre.angularSensibility = 4000;
    camLibre.keysUp = [87];           // W
    camLibre.keysDown = [83];         // S
    camLibre.keysLeft = [65];         // A
    camLibre.keysRight = [68];        // D
    camLibre.keysUpward = [32];       // Espacio: subir
    camLibre.keysDownward = [16, 17]; // Shift o Ctrl: bajar
    camLibre.checkCollisions = false;

    scene.activeCamera = camTop;
    camTop.attachControl(canvas, true);

    const light = new BABYLON.HemisphericLight('luz', new BABYLON.Vector3(0, 1, 0), scene);
    light.intensity = 0.95;
    light.specular = new BABYLON.Color3(0, 0, 0);   // sin reflejo especular: evita que las cajas se "quemen" en blanco mirando desde arriba

    BABYLON.SceneLoader.ImportMesh('', '/mapa3d/modelo/', 'deposito.glb', scene, (meshes) => {
      document.getElementById('loading').style.display = 'none';

      meshes.forEach(m => {
        m.isPickable = false;
        m.renderingGroupId = 2;
      });

      const bounds = scene.getWorldExtends();
      _minY = bounds.min.y;
      _maxY = bounds.max.y;
      const center = BABYLON.Vector3.Center(bounds.min, bounds.max);

      // El piso y el encuadre cenital se arman en cargarEstadoModulos, ajustados al área REAL
      // de los racks (no al bounding del .glb, que incluye paredes/espacio vacío).

      // Posición inicial de la cámara libre (entrada del depósito, a la altura de la vista)
      camLibre.position = new BABYLON.Vector3(center.x, bounds.min.y + 1.7, bounds.min.z - 4);
      camLibre.setTarget(new BABYLON.Vector3(center.x, bounds.min.y + 1.7, center.z));

      cargarEstadoModulos(scene);
    });

    const label = document.getElementById('highlight-label');
    scene.onPointerMove = (evt, pick) => {
      if (pick.hit && MODULE_REGEX.test(pick.pickedMesh?.name)) {
        label.style.display = 'block';
        label.style.left = evt.clientX + 12 + 'px';
        label.style.top  = evt.clientY + 12 + 'px';
        label.textContent = pick.pickedMesh.name;
      } else {
        label.style.display = 'none';
      }
    };

    scene.onPointerDown = (evt, pick) => {
      if (evt.button !== 0) return;
      if (pick.hit && MODULE_REGEX.test(pick.pickedMesh?.name)) {
        mostrarModulo(pick.pickedMesh.name);
      }
    };

    return scene;
  };

  // Cambia entre vista cenital y modo libre.
  function setModoLibre(on) {
    modoLibre = !!on;
    const chk = document.getElementById('chk-libre');
    if (chk) chk.checked = modoLibre;
    scene.activeCamera.detachControl(canvas);
    scene.activeCamera = modoLibre ? camLibre : camTop;
    scene.activeCamera.attachControl(canvas, true);
    canvas.focus();
    actualizarInstrucciones();
    pintarResaltados();   // el marcador cambia según el modo
  }

  async function cargarEstadoModulos(scene) {
    try {
      const SCALE = 0.0254;

      const [resDB, resCSV] = await Promise.all([
        fetch('/api/mapa/modulos'),
        fetch('/mapa3d/modelo/modulos_pos.csv')
      ]);
      const modulosDB = await resDB.json();
      const csvText  = await resCSV.text();

      const estado = {};
      modulosDB.forEach(m => estado[m.Modulo.trim()] = m.CantidadArticulos);

      let bxMinX = Infinity, bxMaxX = -Infinity, bxMinZ = Infinity, bxMaxZ = -Infinity;
      csvText.trim().split('\n').slice(1).forEach(line => {
        const [nombre, cx, cy, cz, sx, sy, sz] = line.split(',');
        const n = nombre.trim();

        const shrink = 1.01;
        const box = BABYLON.MeshBuilder.CreateBox(n, {
          width:  parseFloat(sx) * SCALE * shrink,
          height: parseFloat(sz) * SCALE * shrink,
          depth:  parseFloat(sy) * SCALE * shrink
        }, scene);

        box.position.x = -parseFloat(cx) * SCALE;
        box.position.y =  parseFloat(cz) * SCALE;
        box.position.z = -parseFloat(cy) * SCALE;
        box.renderingGroupId = 1;

        const hx = parseFloat(sx) * SCALE / 2, hz = parseFloat(sy) * SCALE / 2;
        bxMinX = Math.min(bxMinX, box.position.x - hx); bxMaxX = Math.max(bxMaxX, box.position.x + hx);
        bxMinZ = Math.min(bxMinZ, box.position.z - hz); bxMaxZ = Math.max(bxMaxZ, box.position.z + hz);

        const tieneStock = (estado[n] || 0) > 0;
        box._tieneStock = tieneStock;

        const mat = new BABYLON.StandardMaterial('mat_' + n, scene);
        mat.diffuseColor = tieneStock
          ? new BABYLON.Color3(0.1, 0.8, 0.2)
          : new BABYLON.Color3(0.85, 0.12, 0.08);
        mat.specularColor = new BABYLON.Color3(0, 0, 0);
        mat.zOffset = -8;
        box.material = mat;

        box.enableEdgesRendering(0.9);
        box.edgesWidth = 5.0;
        box.edgesColor = new BABYLON.Color4(0.0, 0.0, 0.0, 1.0);
      });

      // Piso y encuadre cenital ajustados al área REAL de los racks (con un margen, no al .glb entero).
      if (isFinite(bxMinX)) {
        const MARG = 6;
        const cx = (bxMinX + bxMaxX) / 2, cz = (bxMinZ + bxMaxZ) / 2;
        const w = (bxMaxX - bxMinX) + MARG * 2, h = (bxMaxZ - bxMinZ) + MARG * 2;
        const piso = BABYLON.MeshBuilder.CreateGround('piso', { width: w, height: h }, scene);
        piso.position.set(cx, _minY + 0.001, cz);
        piso.isPickable = false;
        const pisoMat = new BABYLON.StandardMaterial('piso_mat', scene);
        pisoMat.diffuseColor  = new BABYLON.Color3(0.48, 0.48, 0.47);
        pisoMat.specularColor = new BABYLON.Color3(0, 0, 0);
        piso.material = pisoMat;

        // OJO: setTarget recalcula alpha/beta según la posición actual → fijamos los ángulos DESPUÉS.
        camTop.setTarget(new BABYLON.Vector3(cx, _minY, cz));
        camTop.alpha = Math.PI / 2;              // rotado 180° respecto del default
        camTop.beta = 0.12;                      // bien desde arriba (casi perpendicular)
        camTop.radius = Math.max(w, h) * 1.2;    // alejado: entra todo el depósito
        camTop.upperRadiusLimit = camTop.radius * 2.5;
      }

      pintarResaltados();
    } catch(e) {
      console.error('Error cargando módulos:', e);
    }
  }

  async function mostrarModulo(nombre) {
    const panel = document.getElementById('panel');
    const titulo = document.getElementById('panel-titulo');
    const contenedor = document.getElementById('panel-productos');

    panel.style.display = 'block';
    titulo.textContent = 'Modulo ' + nombre;
    contenedor.innerHTML = '<p style="color:#888;font-size:13px">Cargando...</p>';

    try {
      const res = await fetch('/api/mapa/modulo/' + nombre);
      const data = await res.json();

      if (data.vacio) {
        contenedor.innerHTML = '<p style="color:#ff6b6b;font-size:13px">Sin articulos en este modulo</p>';
        return;
      }

      contenedor.innerHTML = data.productos.map(p => `
        <div class="producto">
          <div>${p.ARTDES}</div>
          <div class="artcod">
            <a href="/consulta-articulo?codigo=${encodeURIComponent(p.ARTCOD)}&ref=1" target="_top"
               style="color:#4fc3f7;text-decoration:none;font-weight:bold" title="Ver ficha del artículo (Volver regresa al mapa)">${p.ARTCOD} ↗</a>
            &nbsp;|&nbsp; ${p.MARCA || ''}
            ${p.NroPalet ? `<span class="palet-badge">Palet ${p.NroPalet}</span>` : ''}
          </div>
        </div>
      `).join('');
    } catch(e) {
      contenedor.innerHTML = '<p style="color:#ff6b6b;font-size:13px">Error al cargar datos</p>';
    }
  }

  // ---- Resaltado ----
  // Cenital: marca la posición DESDE ARRIBA con un beam vertical (fácil de ubicar a vista de pájaro).
  // Modo libre: marca la posición EXACTA recoloreando la caja del módulo.
  let _resaltadosNombres = [];
  let meshesResaltados = [];
  let _beams = [];

  function resaltarModulos(nombres) {
    _resaltadosNombres = nombres || [];
    pintarResaltados();
  }

  function pintarResaltados() {
    limpiarHighlights();
    _resaltadosNombres.forEach(nombre => {
      const mesh = scene.getMeshByName(nombre);
      if (!mesh) return;

      // Siempre recolorea la caja (visible tanto desde arriba como en modo libre).
      const hlMat = new BABYLON.StandardMaterial('hl_' + nombre, scene);
      hlMat.diffuseColor  = new BABYLON.Color3(1.0, 0.82, 0.0);
      hlMat.emissiveColor = new BABYLON.Color3(0, 0, 0);   // sin glow: marca plana, sólo la caja (no se "funde" en columna)
      hlMat.specularColor = new BABYLON.Color3(0, 0, 0);
      hlMat.zOffset = -8;
      mesh.material = hlMat;
      mesh.edgesColor = new BABYLON.Color4(1.0, 0.55, 0.0, 1.0);
      meshesResaltados.push(mesh);
    });
  }

  function limpiarHighlights() {
    meshesResaltados.forEach(mesh => {
      const mat = new BABYLON.StandardMaterial('mat_' + mesh.name, scene);
      mat.diffuseColor = mesh._tieneStock
        ? new BABYLON.Color3(0.1, 0.8, 0.2)
        : new BABYLON.Color3(0.85, 0.12, 0.08);
      mat.specularColor = new BABYLON.Color3(0, 0, 0);
      mat.zOffset = -8;
      mesh.material = mat;
      mesh.edgesColor = new BABYLON.Color4(0.0, 0.0, 0.0, 1.0);
    });
    meshesResaltados = [];
    _beams.forEach(b => b.dispose());
    _beams = [];
  }

  async function buscarArticulo() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    const res = await fetch('/api/mapa/buscar?q=' + encodeURIComponent(q));
    const modulos = await res.json();

    const count = document.getElementById('search-count');
    document.getElementById('btn-limpiar').style.display = 'inline';

    if (!modulos.length) { count.textContent = 'Sin resultados'; resaltarModulos([]); return; }
    count.textContent = modulos.length + ' módulo' + (modulos.length !== 1 ? 's' : '');
    resaltarModulos(modulos);
  }

  function limpiarBusqueda() {
    resaltarModulos([]);
    document.getElementById('search-input').value = '';
    document.getElementById('search-count').textContent = '';
    document.getElementById('btn-limpiar').style.display = 'none';
  }

  function cerrarPanel() {
    document.getElementById('panel').style.display = 'none';
  }

  const scene = createScene();
  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
  actualizarInstrucciones();

  // ---- Resaltado pedido desde el reporte (página Blazor) por postMessage ----
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.tipo === 'resaltar') resaltarModulos(d.modulos || []);
  });
</script>
</body>
</html>
